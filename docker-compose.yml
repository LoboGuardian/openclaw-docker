services:
  openclaw:
    build: .
    image: openclaw:local
    container_name: openclaw
    restart: unless-stopped

    # Hardening
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # Workspace: only expose a dedicated directory, never ~/ or /
    volumes:
      - ./workspace:/workspace
      # Temp dirs needed by Node at runtime
      - tmpfs_tmp:/tmp
      - tmpfs_node:/app/.npm

    # Network: restrict to only what openclaw needs.
    # Use "none" if you don't need internet access.
    # Use a custom bridge if you want a DNS allowlist via a proxy.
    networks:
      - openclaw-net

    env_file:
      - .env

    # Resource limits — prevent runaway processes
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

volumes:
  tmpfs_tmp:
    driver_opts:
      type: tmpfs
      device: tmpfs
  tmpfs_node:
    driver_opts:
      type: tmpfs
      device: tmpfs

networks:
  openclaw-net:
    driver: bridge
